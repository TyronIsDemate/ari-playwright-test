name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Nightly run against the beta environment (07:00 UTC).
  schedule:
    - cron: '0 7 * * *'
  # Allow manual runs from the Actions tab, optionally overriding the base URL.
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://ari.beta.citizenhealth.com'

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.project }})
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Cross-browser coverage. Mobile projects share these engines, so we
        # run the three desktop engines in CI; add mobile-* locally as needed.
        project: [chromium, firefox, webkit]

    env:
      CI: 'true'
      BASE_URL: ${{ github.event.inputs.base_url || vars.BASE_URL || 'https://ari.beta.citizenhealth.com' }}
      # Passwordless phone + OTP auth. By default the suite sends NO SMS (it
      # validates the phone UI via button state). The OTP/happy-path tests are
      # opt-in and skip unless these are provided.
      ARI_ALLOW_OTP_FLOW: ${{ vars.ARI_ALLOW_OTP_FLOW || 'false' }}
      ARI_TEST_PHONE: ${{ secrets.ARI_TEST_PHONE }}
      ARI_TEST_OTP: ${{ secrets.ARI_TEST_OTP }}
      ARI_REGISTERED_PHONE: ${{ secrets.ARI_REGISTERED_PHONE }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces, videos, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7
